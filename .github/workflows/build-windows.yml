name: Build LASR for Windows

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Set up uv
      uses: astral-sh/setup-uv@v5

    - name: Build LASR launcher
      shell: cmd
      run: scons.bat launcher updateVersionType= --all-cores

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: LASR-Windows-Release
        path: output\*.exe
